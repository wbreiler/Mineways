# Builds the wxWidgets macOS port (Mac/) into a self-contained Mineways.app.
# - Every push/PR touching Mac/ or Win/ builds and uploads the app as a workflow artifact.
# - Pushing a tag like "v13.1" additionally attaches the zipped app to a GitHub Release.
#
# Ships unsigned (ad-hoc signed only, no Apple Developer account needed). Finder may
# report the downloaded app as "damaged" due to the quarantine flag on unsigned code —
# see the release body / README for the one-line `xattr -cr` fix.
name: macOS Build

on:
  push:
    branches: [master]
    tags: ['v*']
    paths:
      - 'Mac/**'
      - 'Win/*.cpp'
      - 'Win/*.h'
      - '.github/workflows/macos-build.yml'
  pull_request:
    paths:
      - 'Mac/**'
      - 'Win/*.cpp'
      - 'Win/*.h'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install wxwidgets dylibbundler

      - name: Build app bundle
        run: make -C Mac app

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" Mac/Mineways.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" Mac/Mineways.app/Contents/Info.plist

      - name: Bundle dependencies (make app self-contained)
        run: |
          dylibbundler -od -b \
            -x Mac/Mineways.app/Contents/MacOS/mineways \
            -d Mac/Mineways.app/Contents/Frameworks \
            -p @executable_path/../Frameworks

      - name: Ad-hoc sign whole bundle
        run: codesign --force --deep --sign - Mac/Mineways.app

      - name: Zip app
        run: ditto -c -k --keepParent Mac/Mineways.app Mineways-macOS.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mineways-macOS
          path: Mineways-macOS.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Mineways-macOS.zip
          generate_release_notes: true
          body: |
            **First launch:** this build is unsigned (no paid Apple Developer account), so
            after unzipping, macOS Gatekeeper may show "Mineways.app is damaged and can't
            be opened" — that's just the quarantine flag on an unsigned app, not a broken
            download or a broken zip. Fix it with one Terminal command, then open normally:

            ```
            xattr -cr ~/Downloads/Mineways.app
            ```

            (adjust the path if you moved the app first, e.g. to /Applications)
